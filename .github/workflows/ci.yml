name : CI - Testes Automatizados

on :
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    name: Rodar testes com Maven
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repo
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: ctions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Rodar testes
        run: mvn test